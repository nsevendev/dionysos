<!-- navbar.component.html -->
<header class="bg-blue-600 fixed w-full z-10">
  <div class="container mx-auto px-4 py-4 flex justify-between items-center">
    <!-- Logo -->
    <div class="text-white text-2xl font-bold">
      <a href="#">MyApp</a>
    </div>

    <!-- Links for Desktop -->
    <nav class="hidden md:flex space-x-8">
      <a href="#home" class="text-white hover:text-gray-200">Home</a>
      <a href="#about" class="text-white hover:text-gray-200">About</a>
      <a href="#services" class="text-white hover:text-gray-200">Services</a>
      <a href="#contact" class="text-white hover:text-gray-200">Contact</a>
    </nav>

    <!-- Mobile Menu Button -->
    <div class="md:hidden">
      <button (click)="toggleMenu()" class="text-white focus:outline-none">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
        </svg>
      </button>
    </div>
  </div>

  <!-- Mobile Menu -->
  <div [ngClass]="{'block': isMenuOpen, 'hidden': !isMenuOpen}" class="md:hidden bg-blue-600">
    <a href="#home" class="block text-white py-2 px-4 hover:bg-blue-700">Home</a>
    <a href="#about" class="block text-white py-2 px-4 hover:bg-blue-700">About</a>
    <a href="#services" class="block text-white py-2 px-4 hover:bg-blue-700">Services</a>
    <a href="#contact" class="block text-white py-2 px-4 hover:bg-blue-700">Contact</a>
  </div>
</header>
